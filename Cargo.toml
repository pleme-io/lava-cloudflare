[package]
authors = ["pleme-io"]
description = "lava-cloudflare — autogenerated typed (deflava-resource …) shapes for every Cloudflare terraform-provider resource. Mirrors pangea-cloudflare. Source schema kept under schema.json; resources/*.tlisp + _index.tlisp regenerated via `lava-forge generate --schema schema.json --out resources`."
edition = "2024"
license = "MIT"
name = "lava-cloudflare"
readme = "README.md"
repository = "https://github.com/pleme-io/lava-cloudflare"
version = "0.1.1"

[lib]
name = "lava_cloudflare"
path = "src/lib.rs"

[lints.clippy]
pedantic = "warn"
